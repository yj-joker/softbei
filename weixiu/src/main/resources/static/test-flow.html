<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>检修流程接口测试</title>
<style>
:root {
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --success: #059669;
  --warning: #d97706;
  --danger: #dc2626;
  --bg: #f8fafc;
  --card-bg: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --text-muted: #64748b;
  --sidebar-bg: #1e293b;
  --sidebar-text: #cbd5e1;
  --sidebar-active: #4f46e5;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar { width: 260px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,.1); }
.sidebar-header h2 { font-size: 18px; color: #fff; margin-bottom: 4px; }
.sidebar-header p { font-size: 12px; color: var(--sidebar-text); }
.sidebar-nav { flex: 1; overflow-y: auto; padding: 12px 0; }
.nav-group { margin-bottom: 8px; }
.nav-group-title { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; padding: 8px 20px 4px; color: rgba(255,255,255,.4); }
.nav-item { display: block; width: 100%; text-align: left; padding: 10px 20px; border: none; background: none; color: var(--sidebar-text); cursor: pointer; font-size: 14px; transition: all .15s; border-left: 3px solid transparent; }
.nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
.nav-item.active { background: rgba(79,70,229,.2); color: #fff; border-left-color: var(--sidebar-active); }
.nav-item .method { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; margin-right: 6px; width: 40px; text-align: center; }
.method.get { background: #059669; color: #fff; }
.method.post { background: #4f46e5; color: #fff; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.1); font-size: 12px; }
.login-status { display: flex; align-items: center; gap: 8px; }
.login-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); }
.login-dot.on { background: var(--success); }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-header { padding: 16px 24px; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.main-header h1 { font-size: 20px; }
.main-header .endpoint-badge { font-size: 13px; color: var(--text-muted); }
.main-body { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

/* Cards */
.card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }
.card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 20px; }
.form-grid.span-2 { grid-template-columns: 1fr; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 13px; font-weight: 500; color: var(--text-muted); }
.form-group input, .form-group select, .form-group textarea {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 14px; font-family: inherit; transition: border-color .15s;
  background: #fff;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
.form-group textarea { resize: vertical; min-height: 80px; font-family: 'SF Mono', 'Monaco', 'Consolas', monospace; font-size: 13px; }
.form-group .hint { font-size: 11px; color: var(--text-muted); }
.btn-row { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
.btn { padding: 9px 18px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-outline { background: #fff; color: var(--primary); border: 1px solid var(--primary); }
.btn-outline:hover { background: rgba(79,70,229,.05); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #b91c1c; }

/* Response panel */
.response-panel { background: #1e293b; color: #e2e8f0; border-radius: var(--radius); overflow: hidden; }
.response-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: rgba(0,0,0,.2); }
.response-header h3 { font-size: 14px; color: #94a3b8; }
.response-body { padding: 16px; overflow-x: auto; max-height: 500px; overflow-y: auto; }
.response-body pre { font-family: 'SF Mono', 'Monaco', 'Consolas', monospace; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
.response-status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
.response-status.success { background: rgba(5,150,105,.2); color: #34d399; }
.response-status.error { background: rgba(220,38,38,.2); color: #f87171; }
.response-empty { color: #64748b; font-style: italic; padding: 40px; text-align: center; }

/* SSE stream area */
.sse-stream { background: #0f172a; color: #34d399; border-radius: var(--radius); padding: 16px; max-height: 400px; overflow-y: auto; font-family: 'SF Mono', 'Monaco', 'Consolas', monospace; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
.sse-stream .system-msg { color: #94a3b8; }
.sse-stream .error-msg { color: #f87171; }

/* Log panel */
.log-panel { border-top: 2px solid var(--border); background: var(--card-bg); max-height: 150px; overflow-y: auto; }
.log-panel-header { padding: 8px 24px; font-size: 13px; font-weight: 600; color: var(--text-muted); display: flex; align-items: center; justify-content: space-between; }
.log-entry { padding: 4px 24px; font-size: 12px; font-family: 'SF Mono', 'Monaco', 'Consolas', monospace; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
.log-time { color: var(--text-muted); white-space: nowrap; }
.log-msg { flex: 1; }
.log-msg.ok { color: var(--success); }
.log-msg.err { color: var(--danger); }
.log-msg.info { color: var(--primary); }

/* Login overlay */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
.login-card { background: var(--card-bg); border-radius: 12px; padding: 32px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
.login-card h2 { margin-bottom: 20px; text-align: center; }
.login-card .form-group { margin-bottom: 12px; }
.login-card .btn { width: 100%; justify-content: center; margin-top: 8px; }

/* Misc */
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-blue { background: #dbeafe; color: #1d4ed8; }
.badge-green { background: #d1fae5; color: #065f46; }
.badge-red { background: #fee2e2; color: #991b1b; }
.badge-yellow { background: #fef3c7; color: #92400e; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state svg { opacity: .3; margin-bottom: 12px; }
.flex-row { display: flex; align-items: center; gap: 8px; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Login Overlay -->
<div id="loginOverlay" class="overlay">
  <div class="login-card">
    <h2>🔐 登录</h2>
    <div class="form-group">
      <label>用户名</label>
      <input id="loginUsername" type="text" value="admin" placeholder="请输入用户名">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input id="loginPassword" type="password" value="123456" placeholder="请输入密码">
    </div>
    <div id="loginError" style="color:var(--danger);font-size:13px;margin-bottom:8px;display:none;"></div>
    <button class="btn btn-primary" onclick="doLogin()">登 录</button>
  </div>
</div>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h2>🔧 检修流程测试</h2>
    <p>MaintenanceTaskController</p>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-group">
      <div class="nav-group-title">基础操作</div>
      <button class="nav-item active" data-section="create">
        <span class="method post">POST</span>创建任务
      </button>
      <button class="nav-item" data-section="list">
        <span class="method get">GET</span>任务列表
      </button>
      <button class="nav-item" data-section="detail">
        <span class="method get">GET</span>任务详情
      </button>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">执行流程</div>
      <button class="nav-item" data-section="start">
        <span class="method post">POST</span>开始执行
      </button>
      <button class="nav-item" data-section="retry">
        <span class="method post">POST</span>重试生成
      </button>
      <button class="nav-item" data-section="steps">
        <span class="method get">GET</span>步骤列表
      </button>
      <button class="nav-item" data-section="execute">
        <span class="method post">POST</span>执行步骤
      </button>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">AI 交互</div>
      <button class="nav-item" data-section="chat">
        <span class="method post">POST</span>AI对话(SSE)
      </button>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">提升操作</div>
      <button class="nav-item" data-section="promote">
        <span class="method post">POST</span>提升为规程
      </button>
      <button class="nav-item" data-section="promoteGraph">
        <span class="method post">POST</span>提升到图谱
      </button>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="login-status">
      <span class="login-dot" id="statusDot"></span>
      <span id="statusText">未登录</span>
    </div>
  </div>
</aside>

<!-- Main Content -->
<main class="main">
  <div class="main-header">
    <div class="flex-row">
      <h1 id="sectionTitle">创建任务</h1>
      <span class="endpoint-badge" id="endpointBadge">POST /weixiu/task</span>
    </div>
    <div class="flex-row">
      <span style="font-size:13px;color:var(--text-muted);">当前taskId:</span>
      <span id="currentTaskIdDisplay" style="font-family:monospace;font-size:14px;font-weight:600;color:var(--primary);">--</span>
      <button class="btn btn-sm btn-outline" onclick="copyTaskId()">复制</button>
    </div>
  </div>
  <div class="main-body" id="mainBody">
    <!-- Dynamic content -->
  </div>

  <!-- Log panel -->
  <div class="log-panel" id="logPanel">
    <div class="log-panel-header">
      <span>📋 操作日志</span>
      <button class="btn btn-sm btn-outline" onclick="clearLogs()">清空</button>
    </div>
    <div id="logEntries"></div>
  </div>
</main>

<script>
// ==================== STATE ====================
let currentSection = 'create';
let loggedIn = false;

// ==================== HELPERS ====================
function $(id) { return document.getElementById(id); }
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function now() { return new Date().toLocaleTimeString('zh-CN', { hour12: false }); }
function getTaskId() { return sessionStorage.getItem('taskId') || ''; }
function setTaskId(id) { sessionStorage.setItem('taskId', String(id)); $('currentTaskIdDisplay').textContent = id; updateTaskIdDisplays(); }
function updateTaskIdDisplays() {
  const tid = getTaskId();
  $('currentTaskIdDisplay').textContent = tid || '--';
  document.querySelectorAll('.auto-task-id').forEach(el => { if (!el.value) el.placeholder = tid || '请输入taskId'; });
}
function copyTaskId() {
  const tid = getTaskId();
  if (!tid) return log('没有可复制的taskId', 'info');
  navigator.clipboard.writeText(tid).then(() => log('taskId 已复制: ' + tid, 'ok'));
}

// ==================== LOG ====================
function log(msg, type) {
  type = type || 'info';
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-time">${now()}</span><span class="log-msg ${type}">${escapeHtml(msg)}</span>`;
  const container = $('logEntries');
  container.prepend(entry);
  if (container.children.length > 100) container.removeChild(container.lastChild);
}
function clearLogs() { $('logEntries').innerHTML = ''; }

// ==================== API ====================
async function api(method, path, options) {
  options = options || {};
  const { body, params, raw } = options;
  let url = path;
  if (params) {
    const sp = new URLSearchParams();
    for (const [k, v] of Object.entries(params)) {
      if (v !== undefined && v !== null && v !== '') sp.append(k, String(v));
    }
    const qs = sp.toString();
    if (qs) url += '?' + qs;
  }
  const fetchOpts = { method, credentials: 'include', headers: {} };
  if (body && method !== 'GET') {
    fetchOpts.headers['Content-Type'] = 'application/json';
    fetchOpts.body = JSON.stringify(body);
  }
  try {
    const res = await fetch(url, fetchOpts);
    if (raw) return res;
    const json = await res.json();
    return json;
  } catch (e) {
    return { code: 'NETWORK_ERROR', message: e.message, data: null };
  }
}

function isSuccess(json) { return json && json.code === '200'; }

function showResponse(json, reqInfo) {
  const panel = $('responsePanel');
  if (!panel) return;
  const statusClass = isSuccess(json) ? 'success' : 'error';
  const statusText = isSuccess(json) ? '✓ ' + json.code : '✗ ' + (json.code || 'ERROR');
  let html = '<div class="response-header"><div class="flex-row">';
  html += `<span class="response-status ${statusClass}">${statusText}</span>`;
  html += `<span style="font-size:12px;color:#94a3b8;">${escapeHtml(json.message || '')}</span>`;
  html += '</div>';
  html += '<div class="flex-row">';
  if (reqInfo) html += `<span style="font-size:11px;color:#64748b;">${escapeHtml(reqInfo)}</span>`;
  html += '<button class="btn btn-sm btn-outline" style="color:#94a3b8;border-color:#475569;" onclick="copyResponse()">复制响应</button>';
  html += '</div></div>';
  html += '<div class="response-body"><pre id="responseContent">' + escapeHtml(JSON.stringify(json, null, 2)) + '</pre></div>';
  panel.innerHTML = html;
}

function copyResponse() {
  const pre = $('responseContent');
  if (!pre) return;
  navigator.clipboard.writeText(pre.textContent).then(() => log('响应已复制', 'ok'));
}

async function callAndShow(method, path, options, label) {
  log(`${method} ${path}`, 'info');
  const json = await api(method, path, options);
  const ok = isSuccess(json);
  log(`${ok ? '✓' : '✗'} ${json.code || 'ERROR'} ${json.message || ''}`, ok ? 'ok' : 'err');
  showResponse(json, label || (method + ' ' + path));
  // Auto-set taskId if response contains one
  if (ok && json.data && json.data.id) {
    setTaskId(json.data.id);
  }
  return json;
}

// ==================== SSE Chat ====================
async function sseChat(taskId, stepId, message, images) {
  const streamArea = $('sseStreamArea');
  if (streamArea) streamArea.innerHTML = '';
  log(`SSE POST /weixiu/task/${taskId}/steps/${stepId}/chat`, 'info');
  try {
    const res = await fetch(`/weixiu/task/${taskId}/steps/${stepId}/chat`, {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, images: images || [] })
    });
    if (!res.ok) {
      const err = await res.text();
      if (streamArea) streamArea.innerHTML = '<span class="error-msg">HTTP ' + res.status + ': ' + escapeHtml(err) + '</span>';
      log('✗ SSE 连接失败: ' + res.status, 'err');
      return;
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data:')) {
          const data = line.substring(5).trim();
          if (data === '[DONE]') {
            if (streamArea) streamArea.innerHTML += '<span class="system-msg">--- 对话结束 ---</span>\n';
            log('✓ SSE 对话完成', 'ok');
            return;
          }
          try {
            const parsed = JSON.parse(data);
            if (streamArea) streamArea.innerHTML += escapeHtml(JSON.stringify(parsed, null, 2)) + '\n';
          } catch {
            if (streamArea) streamArea.innerHTML += escapeHtml(data) + '\n';
          }
        } else if (line.startsWith('event:')) {
          if (streamArea) streamArea.innerHTML += '<span class="system-msg">[' + escapeHtml(line.substring(6).trim()) + ']</span>\n';
        }
        if (streamArea) streamArea.scrollTop = streamArea.scrollHeight;
      }
    }
  } catch (e) {
    if (streamArea) streamArea.innerHTML += '<span class="error-msg">错误: ' + escapeHtml(e.message) + '</span>\n';
    log('✗ SSE 错误: ' + e.message, 'err');
  }
}

// ==================== LOGIN ====================
async function doLogin() {
  const username = $('loginUsername').value.trim();
  const password = $('loginPassword').value.trim();
  if (!username || !password) {
    $('loginError').style.display = 'block';
    $('loginError').textContent = '请输入用户名和密码';
    return;
  }
  log('POST /weixiu/user/login', 'info');
  $('loginError').style.display = 'none';
  try {
    const res = await fetch('/weixiu/user/login', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const json = await res.json();
    if (json.code === '200') {
      loggedIn = true;
      $('loginOverlay').style.display = 'none';
      $('statusDot').classList.add('on');
      $('statusText').textContent = username;
      log('✓ 登录成功', 'ok');
    } else {
      $('loginError').style.display = 'block';
      $('loginError').textContent = json.message || '登录失败';
      log('✗ 登录失败: ' + json.message, 'err');
    }
  } catch (e) {
    $('loginError').style.display = 'block';
    $('loginError').textContent = '网络错误: ' + e.message;
    log('✗ 登录网络错误', 'err');
  }
}

// Check login status on load
async function checkLogin() {
  try {
    const res = await fetch('/weixiu/user/login', { method: 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) });
    // This will likely fail with 401 - just show the login overlay
    $('loginOverlay').style.display = 'flex';
  } catch (e) {
    $('loginOverlay').style.display = 'flex';
  }
}

// ==================== SECTION RENDERING ====================
function showSection(name) {
  currentSection = name;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-section="${name}"]`).classList.add('active');
  updateTaskIdDisplays();
  renderSection(name);
}

function responsePanelHtml() {
  return '<div class="card" id="responsePanel"><div class="response-empty">点击发送按钮后，响应将显示在此处</div></div>';
}

function quickFillBtn(taskId) {
  return `<button class="btn btn-sm btn-outline" onclick="setTaskId('${taskId}');updateTaskIdDisplays();log('已设置 taskId: ${taskId}','info');">填充当前taskId</button>`;
}

function renderSection(name) {
  const body = $('mainBody');
  const tid = getTaskId();
  let html = '';

  switch (name) {
    // ==================== CREATE ====================
    case 'create':
      $('sectionTitle').textContent = '创建任务';
      $('endpointBadge').textContent = 'POST /weixiu/task';
      html = `
        <div class="card">
          <div class="card-title"><span>📝 创建检修任务</span><button class="btn btn-sm btn-outline" onclick="fillCreateSample()">填入示例数据</button></div>
          <div class="form-grid">
            <div class="form-group"><label>设备ID (deviceId)</label><input id="f_deviceId" placeholder="知识图谱节点ID，可选"></div>
            <div class="form-group"><label>设备名称 (deviceName)</label><input id="f_deviceName" placeholder="例如：注塑机A-01"></div>
            <div class="form-group full"><label>故障描述 (faultDescription) *必填</label><textarea id="f_faultDescription" placeholder="描述设备故障现象..."></textarea></div>
            <div class="form-group"><label>紧急程度 (urgencyLevel)</label>
              <select id="f_urgencyLevel"><option value="0">0 - 低</option><option value="1" selected>1 - 一般</option><option value="2">2 - 紧急</option></select>
            </div>
            <div class="form-group"><label>维修级别 (maintenanceLevel)</label>
              <select id="f_maintenanceLevel"><option value="">无</option><option value="ROUTINE" selected>ROUTINE - 日常</option><option value="MINOR">MINOR - 小修</option><option value="MAJOR">MAJOR - 大修</option></select>
            </div>
            <div class="form-group full"><label>报修图片 (reportImages)</label><input id="f_reportImages" placeholder="图片URL，逗号分隔，可选"></div>
          </div>
          <div class="btn-row" style="margin-top:16px;">
            <button class="btn btn-primary" onclick="doCreate()">发送请求</button>
          </div>
        </div>
        ${responsePanelHtml()}
      `;
      break;

    // ==================== LIST ====================
    case 'list':
      $('sectionTitle').textContent = '任务列表';
      $('endpointBadge').textContent = 'GET /weixiu/task';
      html = `
        <div class="card">

// ==================== API CALLS ====================
function getParam(id) { return $(id) ? $(id).value : ''; }
function getInt(id) { const v = parseInt(getParam(id)); return isNaN(v) ? undefined : v; }
function getBool(id) { return $(id) ? $(id).checked : false; }
function parseImages(str) {
  if (!str || !str.trim()) return [];
  return str.split(',').map(s => s.trim()).filter(Boolean);
}
function parseJsonArray(str) {
  if (!str || !str.trim()) return [];
  try { const v = JSON.parse(str); return Array.isArray(v) ? v : []; }
  catch (e) { log('JSON解析失败: ' + e.message + '，将作为空数组处理', 'err'); return []; }
}

async function doCreate() {
  const body = {
    deviceId: getParam('f_deviceId') || undefined,
    deviceName: getParam('f_deviceName') || undefined,
    faultDescription: getParam('f_faultDescription'),
    urgencyLevel: getInt('f_urgencyLevel'),
    reportImages: parseImages(getParam('f_reportImages')),
    maintenanceLevel: getParam('f_maintenanceLevel') || undefined,
  };
  // Remove undefined keys
  Object.keys(body).forEach(k => { if (body[k] === undefined) delete body[k]; });
  const json = await callAndShow('POST', '/weixiu/task', { body }, 'POST /weixiu/task');
  if (isSuccess(json) && json.data) {
    // Create returns MaintenanceTaskVO which has id
    if (json.data.id) setTaskId(json.data.id);
    // Also try taskNumber for display
    if (json.data.taskNumber) log('任务编号: ' + json.data.taskNumber, 'ok');
  }
}

async function doList() {
  const params = {
    page: getInt('f_page') || 1,
    size: getInt('f_size') || 10,
    status: getParam('f_status') || undefined,
    deviceName: getParam('f_listDeviceName') || undefined,
  };
  Object.keys(params).forEach(k => { if (params[k] === undefined) delete params[k]; });
  await callAndShow('GET', '/weixiu/task', { params }, 'GET /weixiu/task');
}

async function doDetail() {
  const tid = getParam('f_detailId') || getTaskId();
  if (!tid) { log('请先输入taskId', 'err'); return; }
  setTaskId(tid);
  const json = await callAndShow('GET', `/weixiu/task/${tid}`, {}, `GET /weixiu/task/${tid}`);
  if (isSuccess(json) && json.data) {
    log(`任务状态: ${json.data.status || '?'}, 步骤数: ${(json.data.steps || []).length}`, 'ok');
  }
}

async function doStart() {
  const tid = getParam('f_startId') || getTaskId();
  if (!tid) { log('请先输入taskId', 'err'); return; }
  setTaskId(tid);
  await callAndShow('POST', `/weixiu/task/${tid}/start`, {}, `POST /weixiu/task/${tid}/start`);
}

async function doRetry() {
  const tid = getParam('f_retryId') || getTaskId();
  if (!tid) { log('请先输入taskId', 'err'); return; }
  setTaskId(tid);
  await callAndShow('POST', `/weixiu/task/${tid}/retry`, {}, `POST /weixiu/task/${tid}/retry`);
}

async function doSteps() {
  const tid = getParam('f_stepsId') || getTaskId();
  if (!tid) { log('请先输入taskId', 'err'); return; }
  setTaskId(tid);
  const json = await callAndShow('GET', `/weixiu/task/${tid}/steps`, {}, `GET /weixiu/task/${tid}/steps`);
  if (isSuccess(json) && json.data) {
    log(`共 ${json.data.length} 个步骤`, 'ok');
  }
}

async function doExecute() {
  const tid = getParam('f_execTaskId') || getTaskId();
  const sid = getParam('f_execStepId');
  if (!tid || !sid) { log('请输入taskId和stepId', 'err'); return; }
  setTaskId(tid);
  const body = {
    images: parseImages(getParam('f_execImages')),
    note: getParam('f_execNote') || undefined,
    checkpointConfirmed: getBool('f_execCheckpoint') || undefined,
  };
  Object.keys(body).forEach(k => { if (body[k] === undefined) delete body[k]; });
  await callAndShow('POST', `/weixiu/task/${tid}/steps/${sid}/execute`, { body }, `POST /weixiu/task/${tid}/steps/${sid}/execute`);
}

async function doChat() {
  const tid = getParam('f_chatTaskId') || getTaskId();
  const sid = getParam('f_chatStepId');
  const message = getParam('f_chatMessage');
  if (!tid || !sid || !message) { log('请输入taskId、stepId和message', 'err'); return; }
  setTaskId(tid);
  const images = parseImages(getParam('f_chatImages'));
  await sseChat(tid, sid, message, images);
}

async function doPromote() {
  const tid = getParam('f_promoteId') || getTaskId();
  if (!tid) { log('请先输入taskId', 'err'); return; }
  setTaskId(tid);
  const json = await callAndShow('POST', `/weixiu/task/${tid}/promote`, {}, `POST /weixiu/task/${tid}/promote`);
  if (isSuccess(json) && json.data) {
    log('新规程ID: ' + json.data, 'ok');
  }
}

async function doPromoteGraph() {
  const tid = getParam('f_graphTaskId') || getTaskId();
  if (!tid) { log('请先输入taskId', 'err'); return; }
  setTaskId(tid);
  const body = {
    deviceName: getParam('f_graphDeviceName') || undefined,
    components: parseJsonArray(getParam('f_graphComponents')),
    faults: parseJsonArray(getParam('f_graphFaults')),
    solutions: parseJsonArray(getParam('f_graphSolutions')),
    procedureId: getInt('f_graphProcedureId'),
  };
  Object.keys(body).forEach(k => { if (body[k] === undefined) delete body[k]; });
  await callAndShow('POST', `/weixiu/task/${tid}/promote-to-graph`, { body }, `POST /weixiu/task/${tid}/promote-to-graph`);
}

// ==================== INIT ====================
function init() {
  // Nav click handlers
  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => showSection(el.dataset.section));
  });
  // Enter key for login
  $('loginUsername').addEventListener('keydown', e => { if (e.key === 'Enter') $('loginPassword').focus(); });
  $('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  // Show initial section
  renderSection('create');
  updateTaskIdDisplays();
}

window.addEventListener('DOMContentLoaded', init);
