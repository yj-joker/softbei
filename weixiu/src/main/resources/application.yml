spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mail:
    host: ${SMTP_HOST:smtp.qq.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  application:
    name: weixiu
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  neo4j:
    uri: ${SPRING_NEO4J_URI:${BOLT_URI:bolt://127.0.0.1:7687}}
    authentication:
      username: neo4j
      password: ${SPRING_NEO4J_AUTHENTICATION_PASSWORD:${NEO4J_PASSWORD}}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/fix?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:${MYSQL_USER}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD}}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:${RABBITMQ_HOST:127.0.0.1}}
    port: ${SPRING_RABBITMQ_PORT:${RABBITMQ_PORT:5672}}
    username: ${SPRING_RABBITMQ_USERNAME:${RABBITMQ_USER}}
    password: ${SPRING_RABBITMQ_PASSWORD:${RABBITMQ_PASSWORD}}
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:${REDIS_HOST}}
      port: ${SPRING_DATA_REDIS_PORT:${REDIS_PORT:6379}}
      password: ${SPRING_DATA_REDIS_PASSWORD:${REDIS_PASSWORD:}}
      database: 1
      timeout: 10s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
server:
  port: 8080
logging:
  level:
    org.neo4j.ogm: DEBUG              # 打印 OGM 生成的 Cypher
    org.springframework.data.neo4j: DEBUG
aliyun:
  oss:
    region: ${OSS_REGION:}
    bucket: ${OSS_BUCKET:}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
apikey: ${DASHSCOPE_API_KEY}
ai:
  # Python 服务地址，Docker 部署时通过 PYTHON_SERVICE_URL 环境变量覆盖
  python-service-url: ${PYTHON_SERVICE_URL:http://localhost:8000}
  internal-token: ${INTERNAL_TOKEN}
  # Python 端全站鉴权 token，与 FixAgent .env 中的 API_TOKEN 保持一致
  api-token: ${AI_API_TOKEN:}
weixiu:
  task-validate:
    enabled: true        # 入口校验总开关
    llm-enabled: true    # Layer2 快模型层（可单独关，仅留规则层）
# ===== MinIO 配置 =====
minio:
  endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
  public-base-url: ${MINIO_PUBLIC_BASE_URL:${minio.endpoint}}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET}
