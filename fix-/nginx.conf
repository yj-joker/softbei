# 前端容器 Nginx 配置：托管 SPA + 反代后端（对应 vite.config.js 里的 proxy 规则）
# WebSocket 升级所需的 Connection 头映射（http 级，conf.d 已在 http{} 内）
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 与后端 multipart 上限一致（手册/案例 PDF 最大 100MB）
    client_max_body_size 100m;

    # 语音 ASR：/api/asr/* → Java /weixiu/ai/*（对应 vite rewrite ^/api/asr → ''）
    location /api/asr/ {
        proxy_pass http://weixiu:8080/weixiu/ai/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 实时语音识别 WebSocket（比 /weixiu/ai/ 更具体，优先匹配；需 Upgrade 头）
    location /weixiu/ai/asr-stream {
        proxy_pass http://weixiu:8080/weixiu/ai/asr-stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # AI 直连（含 SSE 流式对话）：/weixiu/ai/* 不改写路径
    location /weixiu/ai/ {
        proxy_pass http://weixiu:8080/weixiu/ai/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;          # SSE 必须关闭缓冲，否则流式输出被攒住
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # 通用 API + WebSocket(/api/ws 给 SockJS)：/api/* → Java 根路径（剥掉 /api 前缀）
    location /api/ {
        proxy_pass http://weixiu:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;          # 兼顾经 /api 走的流式接口
        proxy_read_timeout 3600s;
    }

    # SPA 前端路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
